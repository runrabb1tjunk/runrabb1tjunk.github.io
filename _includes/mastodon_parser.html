<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastodon Parser</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/galleria/1.6.1/themes/classic/galleria.classic.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/galleria/1.6.1/themes/folio/galleria.folio.min.css">
    <link rel="stylesheet" href="/uploads/galleria-1.6.1/miniml/galleria.miniml.css">
    <link rel="stylesheet" href="/uploads/galleria-1.6.1/twelve/galleria.twelve.css">
    <link rel="stylesheet" href="/uploads/galleria-1.6.1/azur/galleria.azur.css">
<style>
    /* Основные стили */
    .gallery-wrapper {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        display: block;
    }

    .galleria-container { 
        width: 100% !important; /* Форсируем заполнение по ширине */
        max-width: 800px;
        height: 500px; 
        margin: 20px auto;
        display: block; 
    }

    /* Изначально контейнер прозрачный, чтобы не торчал пустой баннер при загрузке */
    .mastodon-posts-container {
        background-color: transparent;
        border-radius: 8px;
    }
    
    /* Этот класс добавится скриптом только ПОСЛЕ загрузки данных */
    .mastodon-posts-container.has-content {
        background-color: #0d1b2a;
    }
    
    .post-group { 
        margin: 30px 0;
        padding: 20px; 
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        background-color: transparent; /* Управляется родительским контейнером */
        border-radius: 8px; 
    }
    
    .hidden { display: none; }
    .no-title { color: #999; font-style: italic; }
    .error { color: red; padding: 10px; background: #ffe6e6; border-radius: 5px; margin: 20px 0; }
    
    .post-text {
        white-space: pre-wrap;
        font-family: inherit;
        line-height: 1.4;
        text-align: justify;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        padding: none;
        box-sizing: border-box;
        color: #fff;
    }
    
    /* Загрузка — полноэкранный оверлей с затемнением */
    .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(13, 27, 42, 0.85); 
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999; 
    }
    
    .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top: 4px solid #007cba;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    .main-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }
    
    .no-images {
        text-align: center;
        color: #999;
        font-style: italic;
        padding: 10px;
        width: 100%;
        max-width: 800px;
    }
    
    /* Заголовки */
    .post-group h3 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 15px;
        width: 100%;
        max-width: 800px;
        color: #007cba;
    }
    
    /* Список постов */
    .posts-index {
        background: #0d1b2a;
        padding: 20px;
        margin-bottom: 30px;
        border-radius: 8px; 
    }
    
    .posts-index h2 {
        text-align: center;
        margin-top: 0;
        color: #fff;
        border-bottom: 2px solid #007cba;
        padding-bottom: 10px;
    }
    
    .posts-list {
        list-style: none;
        padding: 0;
        margin: 0;
        max-height: 400px;
        overflow-y: auto;
    }
    
    .posts-list li {
        padding: 12px 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        transition: background-color 0.2s;
    }
    
    .posts-list li:hover {
        background-color: rgba(255, 255, 255, 0.05);
    }
    
    .posts-list li:last-child {
        border-bottom: none;
    }
    
    .post-link {
        text-decoration: none;
        color: #007cba;
        display: block;
        font-weight: 500;
        cursor: pointer;
    }
    
    .post-link:hover {
        color: red;
    }
    
    .post-date {
        font-size: 0.85em;
        color: #fff;
        margin-top: 5px;
    }
    
    /* Кнопка возврата */
    .back-to-index {
        position: absolute;
        top: 15px;
        right: 15px;
        background: #f8f9fa;
        color: #333;
        border: 2px solid #007cba;
        border-radius: 50%;
        width: 2em;
        height: 2em;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.2s;
        z-index: 10;
    }
    
    .back-to-index:hover {
        background: #007cba;
        color: white;
    }

    /* Медиа-запрос для мобильных устройств */
    @media (max-width: 768px) {
        .galleria-container {
            height: 400px;
        }
    }

    .galleria-theme-classic {
        background: transparent;
    }

    .galleria-theme-classic .galleria-thumbnails-container {
        bottom: auto;
    }

    .galleria-theme-classic .galleria-image-nav-left,
    .galleria-theme-classic .galleria-image-nav-right {
        opacity: 0;
    }

    .galleria-info, .galleria-info-title, .galleria-info-description, .galleria-errors {
        display: none !important;
    }
</style>
</head>
<body>
    <div class="loading-container" id="main-loader">
        <div class="loading-spinner"></div>
    </div>

    <div class="main-container">
        <div id="posts-index-container"></div>
        <div class="mastodon-posts-container" id="mastodon-posts-container"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/galleria/1.6.1/galleria.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/galleria/1.6.1/themes/classic/galleria.classic.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/galleria/1.6.1/themes/folio/galleria.folio.min.js"></script>
    <script src="/uploads/galleria-1.6.1/miniml/galleria.miniml.js"></script>
    <script src="/uploads/galleria-1.6.1/azur/galleria.azur.js"></script>
    <script src="/uploads/galleria-1.6.1/twelve/galleria.twelve.js"></script>

    <script>
        const MASTODON_CONFIG = {
            instance: 'https://mastodon.social',
            account_id: "115839162512780741"
        };

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ru-RU', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function scrollToElement(elementId) {
            const element = document.getElementById(elementId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function parseNumberedCaptions(text) {
            const captions = [];
            const regex = /(?:^|\n)(\d+)\.\s+([^\n]+)/g;
            let match;
            while ((match = regex.exec(text)) !== null) {
                const number = parseInt(match[1]);
                let captionText = match[2].trim().replace(/#[\w\u0410-\u044F\u0401\u0451]+/gi, '').trim();
                if (captionText) {
                    captions.push({ number, text: captionText });
                }
            }
            return captions.sort((a, b) => a.number - b.number);
        }

        function cleanHtmlPreservingFormatting(html) {
            if (!html) return '';
            return html
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<\/p>/gi, '\n\n')
                .replace(/<\/div>/gi, '\n')
                .replace(/<[^>]*>/g, '')
                .replace(/&nbsp;/g, ' ')
                .replace(/&amp;/g, '&')
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .replace(/&quot;/g, '"');
        }

        function cleanExcessiveNewlines(text) {
            if (!text) return '';
            return text.replace(/\n{3,}/g, '\n\n');
        }

        function isMobileDevice() {
            return window.innerWidth <= 768;
        }

        async function fetchAllMastodonPosts(config) {
            const url = `${config.instance}/api/v1/accounts/${config.account_id}/statuses?limit=40`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
        }

        function processMastodonPosts(posts) {
            return posts.map(post => {
                const hashtags = post.tags ? post.tags.map(tag => tag.name.toLowerCase()) : [];
                const images = post.media_attachments 
                    ? post.media_attachments.filter(media => media.type === 'image').map(media => media.url)
                    : [];

                let cleanText = cleanHtmlPreservingFormatting(post.content);
                let titleFromStars = '';
                const starMatch = cleanText.match(/\*([^*]+)\*/);
                if (starMatch) {
                    titleFromStars = starMatch[1].trim();
                    cleanText = cleanText.replace(/\*[^*]+\*/, '');
                }

                const numberedCaptions = parseNumberedCaptions(cleanText);
                let finalText = cleanText.replace(/#[\w\u0410-\u044F\u0401\u0451]+/gi, '');
                finalText = cleanExcessiveNewlines(finalText).trim();

                return {
                    id: post.id,
                    datetime: post.created_at,
                    text: finalText,
                    hashtags,
                    images,
                    timestamp: new Date(post.created_at).getTime(),
                    titleFromStars,
                    numberedCaptions
                };
            });
        }

        function groupPostsByHashtags(posts) {
            const groups = {};
            const filteredPosts = posts.filter(post => {
                if (post.hashtags.length === 0) return false;
                if (post.hashtags.includes('порядок_рендеринга')) return false;
                return true;
            });

            filteredPosts.forEach(post => {
                const groupHashtags = post.hashtags.filter(tag => tag !== 'порядок_рендеринга');
                if (groupHashtags.length === 0) return;

                const groupKey = groupHashtags.sort().join('|');
                if (!groups[groupKey]) {
                    groups[groupKey] = { 
                        hashtags: groupHashtags, posts: [], combinedText: '', allImages: [],
                        allImageCaptions: [], title: '', allNumberedCaptions: [],
                        latestTimestamp: 0, latestDate: null
                    };
                }
                groups[groupKey].posts.push(post);
                if (post.timestamp > groups[groupKey].latestTimestamp) {
                    groups[groupKey].latestTimestamp = post.timestamp;
                    groups[groupKey].latestDate = post.datetime;
                }
            });

            Object.values(groups).forEach(group => {
                group.posts.sort((a, b) => a.timestamp - b.timestamp);
                const nonEmptyTexts = group.posts.map(post => post.text ? post.text.trim() : '').filter(text => text.length > 0);
                if (nonEmptyTexts.length > 0) {
                    group.combinedText = cleanExcessiveNewlines(nonEmptyTexts.join('\n\n'));
                }
                
                const allGroupCaptions = [];
                group.posts.forEach(post => allGroupCaptions.push(...parseNumberedCaptions(post.text)));
                
                const uniqueCaptions = [];
                const usedNumbers = new Set();
                allGroupCaptions.sort((a, b) => a.number - b.number).forEach(caption => {
                    if (!usedNumbers.has(caption.number)) {
                        uniqueCaptions.push(caption);
                        usedNumbers.add(caption.number);
                    }
                });
                group.allNumberedCaptions = uniqueCaptions;
                
                group.allImages = [];
                group.allImageCaptions = [];
                group.posts.forEach(post => {
                    post.images.forEach((imageUrl) => {
                        group.allImages.push(imageUrl);
                        const globalImageIndex = group.allImages.length - 1;
                        let caption = (group.allNumberedCaptions && group.allNumberedCaptions.length > globalImageIndex)
                            ? `${group.allNumberedCaptions[globalImageIndex].number}. ${group.allNumberedCaptions[globalImageIndex].text}`
                            : `${globalImageIndex + 1}. Изображение ${globalImageIndex + 1}`;
                        group.allImageCaptions.push(caption);
                    });
                });
                
                if (group.posts.length > 0) {
                    const firstPost = group.posts[0];
                    if (firstPost.titleFromStars) {
                        group.title = firstPost.titleFromStars;
                    } else {
                        const firstLine = firstPost.text.split('\n')[0];
                        group.title = firstLine.replace(/#[\w\u0410-\u044F\u0401\u0451]+/gi, '').trim() || 'Название отсутствует';
                    }
                }
            });

            return { groups };
        }

        function initGalleriaForContainer(containerId, images) {
            if (images.length === 0) return;
            const galleriaData = images.map(imgUrl => ({ image: imgUrl, title: '', description: '' }));
            
            setTimeout(() => {
                try {
                    const theme = isMobileDevice() ? 'classic' : 'azur';
                    Galleria.run(`#${containerId}`, { 
                        dataSource: galleriaData, 
                        responsive: true, 
                        theme: theme, 
                        width: '100%', // Передаем ширину строкой, чтобы библиотека не замеряла нули
                        height: 500,
                        imageCrop: false, 
                        autoplay: true, 
                        showInfo: false 
                    });
                } catch (e) { console.error(e); }
            }, 200); // Даем чуть больше времени на отрисовку DOM дерева
        }

        async function initMastodonParser(containerId, config = {}) {
            const finalConfig = { ...MASTODON_CONFIG, ...config };
            const container = document.getElementById(containerId);
            const indexContainer = document.getElementById('posts-index-container');
            const loader = document.getElementById('main-loader');
            
            if (!container) return;
            
            try {
                const rawPosts = await fetchAllMastodonPosts(finalConfig);
                if (rawPosts.length === 0) { 
                    if (loader) loader.style.display = 'none';
                    container.innerHTML = '<div class="error">DIDNT FOUND ANY POSTS</div>'; 
                    return; 
                }
                
                const processedPosts = processMastodonPosts(rawPosts);
                const { groups } = groupPostsByHashtags(processedPosts);
                
                container.innerHTML = '';
                
                if (Object.keys(groups).length === 0) {
                    if (loader) loader.style.display = 'none';
                    container.innerHTML = '<div class="error">NO ANY POSTS ARE AVAILABLE FOR PARSING</div>';
                    return;
                }

                container.classList.add('has-content');

                const groupsArray = Object.values(groups).sort((a, b) => b.latestTimestamp - a.latestTimestamp);
                
                if (indexContainer) {
                    indexContainer.innerHTML = `
                        <div class="posts-index">
                            <h2>posts</h2>
                            <ul class="posts-list">
                                ${groupsArray.map((group, index) => `
                                    <li>
                                        <a class="post-link" onclick="scrollToElement('group-${index}')">${group.title}</a>
                                        <div class="post-date">${formatDate(group.latestDate)}</div>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                }
                
                groupsArray.forEach((group, index) => {
                    if (!group.combinedText && group.allImages.length === 0) return;
                    
                    const groupElement = document.createElement('div');
                    groupElement.className = 'post-group';
                    groupElement.id = `group-${index}`;
                    
                    const galleryId = `gallery-${index}`;
                    groupElement.innerHTML = `
                        <button class="back-to-index" onclick="scrollToElement('posts-index-container')">↑</button>
                        <h3>${group.title}</h3>
                        ${group.combinedText ? `<div class="post-text">${group.combinedText}</div>` : ''}
                        ${group.allImages.length > 0 ? 
                            `<div class="gallery-wrapper"><div id="${galleryId}" class="galleria-container"></div></div>` : 
                            '<div class="no-images">NO IMAGES</div>'
                        }
                    `;
                    container.appendChild(groupElement);
                    if (group.allImages.length > 0) initGalleriaForContainer(galleryId, group.allImages);
                });
                
                if (loader) loader.style.display = 'none';
            } catch (error) {
                console.error(error);
                if (loader) loader.style.display = 'none';
                container.innerHTML = `<div class="error">${error.message}</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => initMastodonParser('mastodon-posts-container'));
    </script>
</body>
</html>
